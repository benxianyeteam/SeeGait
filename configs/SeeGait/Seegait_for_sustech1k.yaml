data_cfg:
  dataset_name: SUSTech1K
  #dataset_root: ./SUSTech1K/SUSTech1K-Released-pkl/ #your_SUSTech1K_dataset_root_path
  dataset_root: "/home/usr/gaitgroup/SUSTech1K/SUSTech1K-Released-pkl/"
  dataset_partition: "/home/usr/dhy/mywork1_mutimodal_fusion/OpenGait-master/Seegait_SDU/datasets/SUSTech1K/SUSTech1K.json"
  #dataset_partition: ./datasets/SUSTech1K/SUSTech1K.json
  num_workers: 1
  data_in_use: [false, false, false, true, false, false, true, false, false, false, false, false, false, false, false, false] #use sil pose
  remove_no_gallery: false # Remove probe if no gallery for it
  test_dataset_name: SUSTech1K

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: true
  restore_hint: 60000
  save_name: SeeGait_for_SUSTech1K
  eval_func: evaluate_indoor_dataset
  sampler:
    batch_shuffle: false
    batch_size: 4
    sample_type: all_ordered # all indicates whole sequence used to test, while ordered means input sequence by its natural order; Other options:   fixed_unordered
    frames_all_limit: 720 # limit the number of sampled frames to prevent out of memory
  metric: euc # cos
  transform:
    - type: Compose
      trf_cfg:
        - type: GaitTR_MultiInput
          joint_format: coco
        - type: SkeletonInput
    - type: BaseSilCuttingTransform


loss_cfg:
  - loss_term_weight: 1.0
    margin: 0.2
    type: TripletLoss
    log_prefix: triplet
  - loss_term_weight: 1.0
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true

model_cfg:
  model: SeeGait
  t_kernel_size: 9
  mask: false
  Backbone:
    mode: 3d
    in_channels: 1
    layers:
      - 1
      - 1
      - 1
      - 1
    channels:
      - 64
      - 128
      - 256
      - 512
  in_channels:
    - 10
    - 64
    - 64
    - 128
    - 256
  SeparateBNNecks:
    class_num: 250


optimizer_cfg:
  lr: 0.0001
  momentum: 0.9
  solver: Adam
  weight_decay: 0
scheduler_cfg:
  gamma: 0.1
  milestones:
  - 40000
  scheduler: MultiStepLR

trainer_cfg:
  enable_float16: true # half_percesion float for memory reduction and speedup
  fix_BN: false
  with_test: true #true
  log_iter: 1000
  restore_ckpt_strict: true
  restore_hint: 0

  save_iter: 20000
  save_name: SeeGait_for_SUSTech1K
  sync_BN: true
  total_iter: 60000
  sampler:
    batch_shuffle: true
    batch_size:
      - 8 # TripletSampler, batch_size[0] indicates Number of Identity
      - 8 #                 batch_size[1] indicates Samples sequqnce for each Identity
    frames_num_fixed: 30 # fixed frames number for training
    frames_skip_num: 4
    sample_type: fixed_ordered # fixed control input frames number, unordered for controlling order of input tensor; Other options: unfixed_ordered or all_ordered
    type: TripletSampler
  transform:
    - type: Compose
      trf_cfg:
        - type: PointNoise
          std: 0.3
        - type: InversePosesPre
          probability: 0.1
        - type: JointNoise
          std: 0.3
        - type: GaitTR_MultiInput
          joint_format: coco
        - type: SkeletonInput
    - type: Compose
      trf_cfg:
        - type: RandomPerspective
          prob: 0.2
        - type: BaseSilCuttingTransform
        - type: RandomHorizontalFlip
          prob: 0.2
        - type: RandomRotate
          prob: 0.2
